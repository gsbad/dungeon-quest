name: Claude Code

# Lets @claude mentions on issues/PRs trigger the official Claude Code
# GitHub Action - it reads the issue/PR context, implements the change,
# and pushes commits/opens a PR itself. Deliberately NOT runs-on the
# self-hosted dungeonquest-vm runner deploy.yml uses - this workflow never
# touches production, it only needs to read/write this repo, so a plain
# GitHub-hosted runner keeps it isolated from the VM entirely.
#
# Setup still needed (can't be done from a workflow file alone):
#   1. Install the Claude GitHub App: https://github.com/apps/claude
#      (or run `/install-github-app` from a Claude Code terminal you're
#      already logged into, which walks through the same install).
#   2. Add ANTHROPIC_API_KEY as a repo secret (Settings -> Secrets and
#      variables -> Actions) - an API key from console.anthropic.com,
#      billed per-token, not tied to any Claude subscription plan.
# Until both are done, an @claude mention here will just fail the
# workflow run (missing secret) instead of doing anything harmful.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # lets Claude read CI results on PRs (e.g. deploy.yml's status)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Point Claude at this repo's own conventions instead of
          # guessing - CONTRIBUTING.md already documents code style,
          # testing expectations (Playwright, no pytest suite), and the
          # Caddyfile-route gotcha for new backend endpoints.
          claude_args: |
            --system-prompt "Follow the conventions in CONTRIBUTING.md and docs/architecture.md. If the change touches balance numbers (damage, XP, item/spell cost), run tools/balance_sim.py before/after and compare. If it adds a new backend route, note in the PR description that the Caddyfile on the VM needs a matching block (see docs/deploy.md) - you cannot edit the Caddyfile yourself, it's not in this repo."
