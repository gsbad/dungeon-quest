name: Deploy to Oracle Cloud VM

# Stage J15: runs on a self-hosted runner installed directly on the
# production VM (see docs/deploy.md) - no SSH key or server address is
# ever stored in GitHub, since the runner already IS the server. Push to
# main (i.e. a merged PR) builds the pygbag web bundle and the backend,
# then deploys both in place, exactly matching the manual steps this
# replaces (see docs/deploy.md's "Redeploy manual" section for the
# commands this workflow mirrors).
on:
  push:
    branches: [main]
    # Doc-only pushes don't need a full pygbag rebuild + service restart -
    # confirmed this triggers needlessly by watching the very docs commit
    # that added this filter run the whole pipeline for a README change.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, dungeonquest-vm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No actions/setup-python - the VM's own python3 (already used to run
      # the backend service) is what pygbag/uvicorn run under in production,
      # so building with anything else risks a version mismatch nobody
      # would see locally.
      - name: Install pygbag
        run: python3 -m pip install --user --upgrade pygbag

      - name: Build web bundle
        run: |
          rm -rf build/web build/web-cache
          mkdir -p build/web build/web-cache
          python3 -m pygbag --build --width 800 --height 600 \
            --template pygbag_template.tmpl main.py

      - name: Deploy web bundle
        run: |
          # --delete: without it, an old build's leftover files (e.g. an
          # .apk named after a previous checkout folder - the runner's
          # dungeon-quest.apk vs. a dev machine's differently-named one,
          # discovered on this workflow's very first real run) would just
          # accumulate in /srv/dungeonquest-web forever instead of being
          # replaced.
          sudo rsync -a --delete build/web/. /srv/dungeonquest-web/
          sudo chown -R root:root /srv/dungeonquest-web
          sudo chmod -R a+rX /srv/dungeonquest-web

      - name: Deploy backend
        run: |
          cp backend/app/main.py backend/app/models.py ~/backend/app/
          rm -rf ~/backend/app/__pycache__
          sudo systemctl restart dungeonquest-backend

      - name: Reload Caddy (picks up any Caddyfile change made manually)
        run: sudo systemctl reload caddy

      - name: Health check
        run: |
          # Retries instead of a single fixed sleep - this flaked once on
          # the very first real run (backend not quite listening yet right
          # after restart, on a small VM under extra load from the pygbag
          # build that just ran), so a plain `sleep 2; curl -f` isn't
          # reliable enough to trust as a gate.
          for i in 1 2 3 4 5; do
            if curl -fsS https://129.80.222.127.sslip.io/health; then
              exit 0
            fi
            sleep 3
          done
          echo "health check failed after retries" >&2
          exit 1
